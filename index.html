<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f13">
<title>Macro Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<style>
  :root {
    --bg: #0f0f13;
    --bg2: #1a1a24;
    --bg3: #22222f;
    --border: #2e2e3e;
    --accent: #6c63ff;
    --accent2: #9c94ff;
    --protein: #4ade80;
    --carbs: #facc15;
    --fat: #f97316;
    --kcal: #e879f9;
    --text: #e8e8f0;
    --muted: #7070a0;
    --danger: #f87171;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

  /* ─── Layout ─── */
  #app { display: flex; flex-direction: column; height: 100%; }
  .view { display: none; flex: 1; overflow-y: auto; padding: 16px 16px calc(16px + var(--safe-bottom)); }
  .view.active { display: block; }

  /* ─── Bottom nav ─── */
  nav {
    display: flex; background: var(--bg2); border-top: 1px solid var(--border);
    padding-bottom: var(--safe-bottom); flex-shrink: 0;
  }
  nav button {
    flex: 1; background: none; border: none; color: var(--muted);
    padding: 10px 4px; font-size: 10px; cursor: pointer; display: flex;
    flex-direction: column; align-items: center; gap: 3px; transition: color 0.15s;
  }
  nav button.active { color: var(--accent2); }
  nav button svg { width: 22px; height: 22px; }

  /* ─── Cards ─── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

  /* ─── Macro rings / bars ─── */
  .macro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .macro-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ring-label { font-size: 11px; color: var(--muted); }
  .ring-val { font-size: 12px; font-weight: 700; }
  svg.ring circle { fill: none; stroke-width: 6; stroke-linecap: round; }
  .ring-track { stroke: var(--bg3); }

  .macro-bars { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { font-size: 12px; color: var(--muted); width: 56px; }
  .bar-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; max-width: 100%; }
  .bar-text { font-size: 11px; color: var(--muted); width: 70px; text-align: right; }

  /* ─── Food log list ─── */
  .log-entry { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .log-entry:last-child { border-bottom: none; }
  .log-info { flex: 1; min-width: 0; }
  .log-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-macros { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .log-kcal { font-size: 13px; font-weight: 700; color: var(--kcal); }
  .btn-icon { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 6px; }
  .btn-icon:hover { color: var(--danger); }

  /* ─── Tabs ─── */
  .tabs { display: flex; background: var(--bg3); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
  .tab { flex: 1; background: none; border: none; color: var(--muted); padding: 8px; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

  /* ─── Inputs ─── */
  input, select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 12px; font-size: 15px; outline: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; }
  .field { margin-bottom: 12px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }

  /* ─── Buttons ─── */
  .btn { width: 100%; padding: 13px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 8px; width: auto; }

  /* ─── Camera ─── */
  #scan-container { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  #scan-video { width: 100%; height: 100%; object-fit: cover; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 65%; aspect-ratio: 1; border: 2px solid var(--accent); border-radius: 8px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); }

  /* ─── Search results ─── */
  .result-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .result-item:hover { background: var(--bg3); }
  .result-name { font-size: 14px; }
  .result-macros { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ─── Modal ─── */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 20px 16px calc(20px + var(--safe-bottom)); width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-close { float: right; background: var(--bg3); border: none; color: var(--muted); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 16px; }

  /* ─── Recipe ─── */
  .recipe-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .recipe-name { font-size: 15px; font-weight: 600; }
  .recipe-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .ingredient-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .ingredient-row:last-child { border-bottom: none; }

  /* ─── Toast ─── */
  #toast { position: fixed; bottom: calc(70px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 1px solid var(--border); padding: 10px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 200; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── Misc ─── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 18px; font-weight: 700; }
  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .tag-protein { background: rgba(74,222,128,0.15); color: var(--protein); }
  .tag-carbs { background: rgba(250,204,21,0.15); color: var(--carbs); }
  .tag-fat { background: rgba(249,115,22,0.15); color: var(--fat); }

  .spinner { width: 24px; height: 24px; border: 3px solid var(--bg3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 20px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .portion-btns { display: flex; gap: 8px; margin-bottom: 12px; }
  .portion-btn { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .portion-btn.active { border-color: var(--accent); color: var(--accent2); }

  /* ─── Meal categories ─── */
  .meal-pills { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .meal-pill { flex: 1; min-width: 60px; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); padding: 7px 4px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; text-align: center; }
  .meal-pill.active { border-color: var(--accent); color: var(--accent2); background: rgba(108,99,255,0.1); }
  .meal-header { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 0 4px; margin-top: 4px; border-top: 1px solid var(--border); }
  .meal-header:first-child { border-top: none; padding-top: 0; }

  /* ─── Streak ─── */
  .streak-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(249,115,22,0.15); color: var(--fat); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700; }

  /* ─── Weight chart ─── */
  .weight-chart { width: 100%; overflow: hidden; margin-top: 8px; }

  /* ─── Weekly summary ─── */
  .week-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
  .week-cell { text-align: center; }
  .week-val { font-size: 16px; font-weight: 700; }
  .week-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ─── Notes ─── */
  textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 14px; outline: none; resize: none; font-family: inherit; }
  textarea:focus { border-color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <!-- ═══ TODAY VIEW ═══ -->
  <div id="view-today" class="view active">
    <div class="section-header">
      <span class="section-title" id="today-date-label">Today</span>
      <button class="btn btn-secondary btn-sm" onclick="showDatePicker()">📅 History</button>
    </div>

    <!-- Kcal ring -->
    <div class="card" id="dashboard-card">
      <div style="display:flex; align-items:center; gap:16px; margin-bottom:16px;">
        <div style="position:relative; width:90px; height:90px; flex-shrink:0;">
          <svg viewBox="0 0 90 90" width="90" height="90">
            <circle class="ring-track" cx="45" cy="45" r="38" style="stroke:var(--bg3); stroke-width:8; fill:none;"/>
            <circle id="kcal-ring" cx="45" cy="45" r="38" style="fill:none; stroke:var(--kcal); stroke-width:8; stroke-linecap:round; stroke-dasharray:239; stroke-dashoffset:239; transform:rotate(-90deg); transform-origin:45px 45px; transition: stroke-dashoffset 0.5s ease;"/>
          </svg>
          <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <span id="kcal-val" style="font-size:18px; font-weight:700; color:var(--kcal);">0</span>
            <span style="font-size:9px; color:var(--muted);">kcal</span>
          </div>
        </div>
        <div style="flex:1;">
          <div style="font-size:13px; color:var(--muted); margin-bottom:8px;">
            <span id="kcal-remaining" style="font-weight:700; color:var(--text);">0</span> remaining
          </div>
          <div class="macro-bars" id="macro-bars"></div>
        </div>
      </div>
    </div>

    <!-- Streak + weight row -->
    <div style="display:flex; gap:8px; margin-bottom:12px; align-items:center;">
      <span id="streak-badge" class="streak-badge" style="display:none;">🔥 0</span>
      <div style="flex:1;"></div>
      <div style="display:flex; align-items:center; gap:6px;">
        <input type="number" id="weight-today-input" placeholder="kg" min="20" max="300" step="0.1"
          style="width:70px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:5px 8px; font-size:13px; outline:none; text-align:center;"
          onchange="logWeightToday(this.value)">
        <span style="font-size:12px; color:var(--muted);">kg</span>
      </div>
    </div>

    <!-- Food log -->
    <div class="card">
      <div class="card-title">Food Log</div>
      <div id="food-log-list"></div>
    </div>

    <!-- Diary notes -->
    <div class="card" style="margin-top:0;">
      <div class="card-title" style="margin-bottom:8px;">Notes</div>
      <textarea id="diary-notes" rows="2" placeholder="How did today feel? Any notes…" oninput="saveDiaryNotes(this.value)"></textarea>
    </div>

    <!-- Weekly summary -->
    <div class="card" id="weekly-summary-card" style="margin-top:0;">
      <div class="card-title">7-Day Average</div>
      <div id="weekly-summary-body"></div>
    </div>

    <!-- Weight chart -->
    <div class="card" id="weight-chart-card" style="margin-top:0; display:none;">
      <div class="card-title">Weight</div>
      <div id="weight-chart-body" class="weight-chart"></div>
    </div>
  </div>

  <!-- ═══ LOG FOOD VIEW ═══ -->
  <div id="view-log" class="view">
    <div class="section-title" style="margin-bottom:14px;">Log Food</div>
    <div class="tabs">
      <button class="tab active" onclick="switchLogTab('scan', this)">📷 Scan</button>
      <button class="tab" onclick="switchLogTab('search', this)">🔍 Search</button>
      <button class="tab" onclick="switchLogTab('manual', this)">✏️ Manual</button>
      <button class="tab" onclick="switchLogTab('quickadd', this)">⚡ Quick</button>
    </div>

    <!-- Scan -->
    <div id="log-scan" class="log-tab">
      <div id="scan-container">
        <video id="scan-video" playsinline muted></video>
        <div class="scan-overlay"><div class="scan-frame"></div></div>
      </div>
      <div id="scan-status" style="text-align:center; color:var(--muted); font-size:13px; margin-bottom:12px;">
        Point camera at a barcode
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" onclick="toggleScan()" style="flex:1">Stop Camera</button>
        <button class="btn btn-secondary" onclick="flipCamera()" style="flex:0 0 auto; padding:10px 16px;" title="Flip camera">⟳</button>
      </div>
    </div>

    <!-- Search -->
    <div id="log-search" class="log-tab" style="display:none;">
      <div class="field">
        <div style="display:flex; gap:8px;">
          <input type="text" id="search-input" placeholder="Search food..." oninput="debounceSearch()" onkeydown="if(event.key==='Enter')doSearch()">
          <button class="btn btn-primary btn-sm" onclick="doSearch()">Go</button>
        </div>
      </div>
      <div id="frequent-foods" style="margin-bottom:8px;"></div>
      <div id="search-results"></div>
    </div>

    <!-- Manual -->
    <div id="log-manual" class="log-tab" style="display:none;">
      <div class="field">
        <label>Food name</label>
        <input type="text" id="manual-name" placeholder="e.g. Chicken breast">
      </div>
      <div class="card-title" style="margin: 4px 0 8px;">Per 100g</div>
      <div class="field-row-4">
        <div class="field">
          <label>Kcal</label>
          <input type="number" id="manual-kcal" placeholder="0">
        </div>
        <div class="field">
          <label>Protein</label>
          <input type="number" id="manual-protein" placeholder="0">
        </div>
        <div class="field">
          <label>Carbs</label>
          <input type="number" id="manual-carbs" placeholder="0">
        </div>
        <div class="field">
          <label>Fat</label>
          <input type="number" id="manual-fat" placeholder="0">
        </div>
      </div>
      <div style="display:flex; gap:8px; margin-bottom: 12px;">
        <button class="btn btn-secondary" style="flex:1;" onclick="logManualFood()">Log Only</button>
        <button class="btn btn-primary" style="flex:1;" onclick="saveAndLogManual()">Save to DB &amp; Log</button>
      </div>
    </div>

    <!-- Quick Add -->
    <div id="log-quickadd" class="log-tab" style="display:none;">
      <div class="card-title" style="margin-bottom:12px;">Quick Add Macros</div>
      <div class="field"><label>Name (optional)</label><input type="text" id="qa-name" placeholder="e.g. Misc snack"></div>
      <div class="field-row-4">
        <div class="field"><label>Kcal</label><input type="number" id="qa-kcal" placeholder="0"></div>
        <div class="field"><label>Protein (g)</label><input type="number" id="qa-protein" placeholder="0"></div>
        <div class="field"><label>Carbs (g)</label><input type="number" id="qa-carbs" placeholder="0"></div>
        <div class="field"><label>Fat (g)</label><input type="number" id="qa-fat" placeholder="0"></div>
      </div>
      <div class="meal-pills" id="qa-meal-pills">
        <button class="meal-pill" onclick="selectQAMeal('Breakfast',this)">Breakfast</button>
        <button class="meal-pill" onclick="selectQAMeal('Lunch',this)">Lunch</button>
        <button class="meal-pill" onclick="selectQAMeal('Dinner',this)">Dinner</button>
        <button class="meal-pill" onclick="selectQAMeal('Snacks',this)">Snacks</button>
      </div>
      <button class="btn btn-primary" onclick="confirmQuickAdd()">Add to Log</button>
    </div>
  </div>

  <!-- ═══ RECIPES VIEW ═══ -->
  <div id="view-recipes" class="view">
    <div class="section-header">
      <span class="section-title">Recipes</span>
      <button class="btn btn-primary btn-sm" onclick="openCreateRecipe()">+ New</button>
    </div>
    <div id="recipes-list"></div>
  </div>

  <!-- ═══ SETTINGS VIEW ═══ -->
  <div id="view-settings" class="view">
    <div class="section-title" style="margin-bottom:14px;">Settings</div>
    <div class="card">
      <div class="card-title">Daily Targets</div>
      <div class="field">
        <label>Calories (kcal)</label>
        <input type="number" id="set-kcal" placeholder="2750">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Protein (g)</label>
          <input type="number" id="set-protein" placeholder="134">
        </div>
        <div class="field">
          <label>Carbs (g)</label>
          <input type="number" id="set-carbs" placeholder="430">
        </div>
      </div>
      <div class="field" style="max-width:50%;">
        <label>Fat (g)</label>
        <input type="number" id="set-fat" placeholder="55">
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">Save Targets</button>
    </div>
    <div class="card" style="margin-top:8px;">
      <div class="card-title">Saved Foods</div>
      <div id="custom-foods-list"></div>
    </div>
    <div class="card" style="margin-top:8px;">
      <div class="card-title">Data</div>
      <div style="font-size:12px; color:var(--muted); margin-bottom:10px;">Version 2026-04-24.21</div>
      <button class="btn btn-secondary" onclick="checkForUpdate()">Check for Updates</button>
      <button class="btn btn-secondary" style="margin-top:8px;" onclick="exportData()">Export JSON</button>
      <button class="btn btn-secondary" style="margin-top:8px; border-color:var(--danger); color:var(--danger);" onclick="clearData()">Clear All Data</button>
    </div>
  </div>

  <!-- ─── Bottom nav ─── -->
  <nav>
    <button class="active" onclick="switchView('today', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Today
    </button>
    <button onclick="switchView('log', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Log Food
    </button>
    <button onclick="switchView('recipes', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/><path d="M17 18l2 2 4-4"/></svg>
      Recipes
    </button>
    <button onclick="switchView('settings', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </button>
  </nav>
</div>

<!-- ─── Weight entry modal ─── -->
<div class="modal-backdrop" id="weight-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('weight-modal')">✕</button>
    <div class="modal-title" id="weight-modal-title">Log Food</div>
    <div id="weight-modal-macros" style="font-size:12px; color:var(--muted); margin-bottom:12px;"></div>
    <div class="meal-pills" id="meal-pills">

<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
<script>
// ═══════════════════════════════════════════════════
//  STORAGE HELPERS
// ═══════════════════════════════════════════════════
const LS = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { toast('Storage full!'); } }
};

function getSettings() {
  return LS.get('mt_settings', { kcal: 2750, protein: 134, fat: 55, carbs: 430 });
}
function getLogs() { return LS.get('mt_logs', []); }
function getRecipes() { return LS.get('mt_recipes', []); }
function getCustomFoods() { return LS.get('mt_custom_foods', []); }
function getBarcodeCache() { return LS.get('mt_barcode_cache', {}); }

function todayKey() { return new Date().toISOString().slice(0, 10); }

function getDayLog(dateKey) {
  const logs = getLogs();
  let day = logs.find(d => d.date === dateKey);
  if (!day) { day = { date: dateKey, entries: [] }; logs.push(day); LS.set('mt_logs', logs); }
  return day;
}

function saveDayLog(dateKey, day) {
  const logs = getLogs();
  const idx = logs.findIndex(d => d.date === dateKey);
  if (idx >= 0) logs[idx] = day; else logs.push(day);
  LS.set('mt_logs', logs);
}

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
let currentView = 'today';
let viewingDate = todayKey();

function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
  currentView = name;
  if (name === 'today') renderToday();
  if (name === 'recipes') renderRecipes();
  if (name === 'settings') renderSettings();
  if (name === 'log') { /* keep current tab */ }
}

// ═══════════════════════════════════════════════════
//  TODAY / DASHBOARD
// ═══════════════════════════════════════════════════
function renderToday() {
  const s = getSettings();
  const day = getDayLog(viewingDate);
  const isToday = viewingDate === todayKey();
  document.getElementById('today-date-label').textContent = isToday ? 'Today' : formatDate(viewingDate);

  const totals = sumEntries(day.entries);

  // Kcal ring
  const pct = Math.min(totals.kcal / s.kcal, 1);
  const circ = 2 * Math.PI * 38;
  const offset = circ - pct * circ;
  document.getElementById('kcal-ring').style.strokeDashoffset = offset;
  document.getElementById('kcal-ring').style.strokeDasharray = circ;
  document.getElementById('kcal-val').textContent = Math.round(totals.kcal);
  document.getElementById('kcal-remaining').textContent = Math.max(0, Math.round(s.kcal - totals.kcal));

  // Macro bars
  const bars = document.getElementById('macro-bars');
  bars.innerHTML = ['protein','carbs','fat'].map(m => {
    const val = totals[m], target = s[m], pctM = Math.min(val/target*100, 100);
    const color = m === 'protein' ? 'var(--protein)' : m === 'carbs' ? 'var(--carbs)' : 'var(--fat)';
    const label = m === 'protein' ? 'P' : m === 'carbs' ? 'C' : 'F';
    return `<div class="bar-row">
      <span class="bar-label">${label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pctM}%;background:${color};"></div></div>
      <span class="bar-text">${r1(val)}/${s[m]}g</span>
    </div>`;
  }).join('');

  // Food log
  const list = document.getElementById('food-log-list');
  if (!day.entries.length) {
    list.innerHTML = '<div class="empty-state">No foods logged yet.<br>Tap Log Food to get started.</div>';
  } else {
    const MEALS = ['Breakfast','Lunch','Dinner','Snacks'];
    let html = '';
    MEALS.forEach(meal => {
      const entries = day.entries.map((e,i) => ({...e, _idx:i})).filter(e => (e.meal || 'Breakfast') === meal);
      if (!entries.length) return;
      html += `<div class="meal-header">${meal}</div>`;
      html += entries.map(e => `
        <div class="log-entry">
          <div class="log-info">
            <div class="log-name">${esc(e.name)}${e.weight ? ` <span style="color:var(--muted);font-size:12px;">${e.weight}g</span>` : ''}</div>
            <div class="log-macros">P ${r1(e.protein)}g · C ${r1(e.carbs)}g · F ${r1(e.fat)}g</div>
          </div>
          <span class="log-kcal">${Math.round(e.kcal)}</span>
          <button class="btn-icon" onclick="openEditEntry('${viewingDate}', ${e._idx})" title="Edit" style="color:var(--muted);">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon" onclick="deleteEntry('${viewingDate}', ${e._idx})" title="Delete">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>`).join('');
    });
    list.innerHTML = html;
  }

  // Streak
  const streak = getStreak();
  const sb = document.getElementById('streak-badge');
  if (streak > 0) { sb.style.display = 'inline-flex'; sb.textContent = `🔥 ${streak} day${streak>1?'s':''}`; }
  else sb.style.display = 'none';

  // Diary notes
  const notesEl = document.getElementById('diary-notes');
  if (notesEl) notesEl.value = day.notes || '';

  // Weight
  const wLog = getWeightLog();
  const todayW = wLog.find(e => e.date === viewingDate);
  const wInput = document.getElementById('weight-today-input');
  if (wInput) wInput.value = todayW ? todayW.weight : '';

  // Weight chart
  const chartCard = document.getElementById('weight-chart-card');
  const chartBody = document.getElementById('weight-chart-body');
  if (wLog.length >= 2 && chartCard && chartBody) {
    chartCard.style.display = '';
    const recent = wLog.slice(-14);
    chartBody.innerHTML = weightSparkline(recent);
    const last = recent[recent.length-1];
    const prev = recent.length>1 ? recent[recent.length-2] : null;
    const diff = prev ? r1(last.weight - prev.weight) : null;
    chartBody.innerHTML += `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:4px;">
      <span>${recent[0].date.slice(5)}</span>
      <span style="font-weight:700;color:var(--text);">${last.weight}kg ${diff!==null?(diff>0?'▲':'▼')+Math.abs(diff)+'kg':''}</span>
      <span>${last.date.slice(5)}</span></div>`;
  } else if (chartCard) chartCard.style.display = 'none';

  // Weekly summary
  const ws = getWeeklySummary();
  const wsBody = document.getElementById('weekly-summary-body');
  if (ws && wsBody) {
    wsBody.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:6px;">${ws.days} days logged this week</div>
    <div class="week-grid">
      <div class="week-cell"><div class="week-val" style="color:var(--kcal);">${Math.round(ws.kcal)}</div><div class="week-lbl">kcal</div></div>
      <div class="week-cell"><div class="week-val" style="color:var(--protein);">${ws.protein}g</div><div class="week-lbl">protein</div></div>
      <div class="week-cell"><div class="week-val" style="color:var(--carbs);">${ws.carbs}g</div><div class="week-lbl">carbs</div></div>
      <div class="week-cell"><div class="week-val" style="color:var(--fat);">${ws.fat}g</div><div class="week-lbl">fat</div></div>
    </div>`;
  } else if (wsBody) wsBody.innerHTML = '<div style="color:var(--muted);font-size:13px;">Log at least one day to see averages</div>';
}

function sumEntries(entries) {
  return entries.reduce((acc, e) => ({
    kcal: acc.kcal + (e.kcal||0),
    protein: acc.protein + (e.protein||0),
    carbs: acc.carbs + (e.carbs||0),
    fat: acc.fat + (e.fat||0)
  }), { kcal:0, protein:0, carbs:0, fat:0 });
}

let editEntryRef = null; // { dateKey, idx }

function openEditEntry(dateKey, idx) {
  const day = getDayLog(dateKey);
  const e = day.entries[idx];
  // Recover barcode from cache if not stored on entry (entries logged before barcode field was added)
  let barcode = e.barcode || null;
  if (!barcode) {
    const cache = getBarcodeCache();
    const hit = Object.entries(cache).find(([, f]) => f.name === e.name);
    if (hit) barcode = hit[0];
  }
  editEntryRef = { dateKey, idx, barcode };
  selectedEditMeal = e.meal || 'Breakfast';
  document.querySelectorAll('#edit-meal-pills .meal-pill').forEach(b => {
    b.classList.toggle('active', b.textContent === selectedEditMeal);
  });
  document.getElementById('edit-name').value = e.name;
  document.getElementById('edit-weight').value = e.weight || '';
  document.getElementById('edit-kcal').value = r1(e.kcal);
  document.getElementById('edit-protein').value = r1(e.protein);
  document.getElementById('edit-carbs').value = r1(e.carbs);
  document.getElementById('edit-fat').value = r1(e.fat);
  openModal('edit-entry-modal');
}

function confirmEditEntry() {
  if (!editEntryRef) return;
  const { dateKey, idx } = editEntryRef;
  const day = getDayLog(dateKey);
  const e = day.entries[idx];
  e.meal = selectedEditMeal;
  e.name = document.getElementById('edit-name').value.trim() || e.name;
  e.weight = parseFloat(document.getElementById('edit-weight').value) || e.weight;
  e.kcal = parseFloat(document.getElementById('edit-kcal').value) || 0;
  e.protein = parseFloat(document.getElementById('edit-protein').value) || 0;
  e.carbs = parseFloat(document.getElementById('edit-carbs').value) || 0;
  e.fat = parseFloat(document.getElementById('edit-fat').value) || 0;
  saveDayLog(dateKey, day);
  closeModal('edit-entry-modal');
  renderToday();
  toast('Entry updated');
}

function saveEditEntryToFoods() {
  if (!editEntryRef) return;
  const { dateKey, idx } = editEntryRef;
  const day = getDayLog(dateKey);
  const e = day.entries[idx];
  const w = parseFloat(document.getElementById('edit-weight').value) || e.weight || 100;
  const kcal = parseFloat(document.getElementById('edit-kcal').value) || 0;
  const protein = parseFloat(document.getElementById('edit-protein').value) || 0;
  const carbs = parseFloat(document.getElementById('edit-carbs').value) || 0;
  const fat = parseFloat(document.getElementById('edit-fat').value) || 0;
  const factor = 100 / w;
  const name = document.getElementById('edit-name').value.trim() || e.name;
  const barcode = editEntryRef.barcode || e.barcode || null;

  const customs = getCustomFoods();
  // Replace existing entry with same barcode/name, or add new
  const existing = barcode ? customs.findIndex(f => f.barcode === barcode) : customs.findIndex(f => f.name === name);
  const entry = {
    id: existing >= 0 ? customs[existing].id : uid(),
    name,
    kcal: r1(kcal * factor),
    protein: r1(protein * factor),
    carbs: r1(carbs * factor),
    fat: r1(fat * factor),
    defaultWeight: w,
    barcode
  };
  if (existing >= 0) customs[existing] = entry;
  else customs.push(entry);
  LS.set('mt_custom_foods', customs);

  // Also update the barcode cache so next scan uses corrected values
  if (barcode) {
    const cache = getBarcodeCache();
    cache[barcode] = { name: entry.name, kcal: entry.kcal, protein: entry.protein, carbs: entry.carbs, fat: entry.fat, defaultWeight: entry.defaultWeight, barcode };
    LS.set('mt_barcode_cache', cache);
  }

  // Also update the current log entry with edited values
  confirmEditEntry();
  toast('Saved to My Foods');
}

function deleteEntry(dateKey, idx) {
  const day = getDayLog(dateKey);
  day.entries.splice(idx, 1);
  saveDayLog(dateKey, day);
  renderToday();
}

function formatDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
}

function showDatePicker() {
  document.getElementById('history-date-input').value = viewingDate;
  openModal('date-modal');
}

function loadHistoryDate() {
  const val = document.getElementById('history-date-input').value;
  if (val) { viewingDate = val; renderToday(); closeModal('date-modal'); }
}

// ═══════════════════════════════════════════════════
//  LOG FOOD TABS
// ═══════════════════════════════════════════════════
let scanActive = false;
let codeReader = null;
let pendingFood = null; // {name, kcal100, protein100, carbs100, fat100}

function switchLogTab(tab, btn) {
  document.querySelectorAll('.log-tab').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('log-' + tab).style.display = 'block';
  btn.classList.add('active');
  if (tab !== 'scan' && scanActive) stopScan();
  if (tab === 'scan' && !scanActive) startScan();
  if (tab === 'search') renderFrequentFoods();
  if (tab === 'quickadd') {
    selectedQAMeal = defaultMeal();
    document.querySelectorAll('#qa-meal-pills .meal-pill').forEach(b => {
      b.classList.toggle('active', b.textContent === selectedQAMeal);
    });
  }
}

let currentFacingMode = 'environment';
async function startScan() {
  if (typeof ZXing === 'undefined') { toast('ZXing not loaded'); return; }
  try {
    stopScan();
    codeReader = new ZXing.BrowserMultiFormatReader();
    scanActive = true;
    document.getElementById('scan-status').textContent = 'Starting camera…';
    const constraints = { video: { facingMode: { ideal: currentFacingMode }, width: { ideal: 1280 }, height: { ideal: 720 } } };
    await codeReader.decodeFromConstraints(constraints, 'scan-video', async (result, err) => {
      if (result) {
        const text = result.getText();
        if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
        document.getElementById('scan-status').textContent = 'Looking up barcode…';
        const food = await lookupBarcode(text);
        if (food) showWeightModal(food, true);
        else {
          document.getElementById('scan-status').textContent = 'Product not found — try search tab.';
          toast('Barcode not found — try search');
          startScan(); // resume
        }
      }
      if (err && !(err instanceof ZXing.NotFoundException)) {
        console.warn('Scan error:', err);
      }
    });
    document.getElementById('scan-status').textContent = 'Point camera at a barcode';
  } catch(e) {
    document.getElementById('scan-status').textContent = 'Camera error: ' + e.message;
    toast('Camera unavailable — check permissions');
    scanActive = false;
  }
}

async function flipCamera() {
  currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
  if (scanActive) await startScan();
}

function stopScan() {
  if (codeReader) { try { codeReader.reset(); } catch(e) {} codeReader = null; }
  scanActive = false;
  const video = document.getElementById('scan-video');
  if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
  document.querySelector('[onclick="toggleScan()"]').textContent = 'Start Camera';
}

function toggleScan() {
  if (scanActive) stopScan();
  else startScan();
}

// ─── Open Food Facts ───
async function lookupBarcode(barcode) {
  const customs = getCustomFoods();
  // Custom foods take priority — check by barcode first, then by name
  const byBarcode = customs.find(f => f.barcode === barcode);
  if (byBarcode) return { ...byBarcode, defaultWeight: byBarcode.defaultWeight || 100 };

  const cache = getBarcodeCache();
  if (cache[barcode] && cache[barcode].defaultWeight !== undefined) return cache[barcode];
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const data = await res.json();
    if (data.status === 1) {
      const p = data.product;
      const n = p.nutriments || {};
      const servingQty = parseFloat(p.serving_quantity) || null;
      const productQty = parseFloat(p.product_quantity) || null;
      const food = {
        name: p.product_name_en || p.product_name_gb || p.product_name || 'Unknown',
        kcal: parseFloat(n['energy-kcal_100g']) || 0,
        protein: parseFloat(n['proteins_100g']) || 0,
        carbs: parseFloat(n['carbohydrates_100g']) || 0,
        fat: parseFloat(n['fat_100g']) || 0,
        fibre: parseFloat(n['fiber_100g']) || parseFloat(n['fibers_100g']) || 0,
        sugar: parseFloat(n['sugars_100g']) || 0,
        sodium: parseFloat(n['sodium_100g']) || 0,
        defaultWeight: servingQty || productQty || 100,
        barcode
      };
      // Check custom foods by name — catches foods saved without a barcode association
      const byName = customs.find(f => f.name.toLowerCase() === food.name.toLowerCase());
      if (byName) {
        // Persist the barcode link so future lookups skip the network
        byName.barcode = barcode;
        LS.set('mt_custom_foods', customs);
        return { ...byName, defaultWeight: byName.defaultWeight || food.defaultWeight };
      }
      cache[barcode] = food;
      LS.set('mt_barcode_cache', cache);
      return food;
    }
  } catch(e) {}
  return null;
}

function isEnglishName(name) {
  // Reject if >30% non-ASCII (catches French, German, etc.)
  const nonAscii = (name.match(/[^\x00-\x7F]/g) || []).length;
  return nonAscii / name.length < 0.3;
}

function offProductToFood(p) {
  const n = p.nutriments || {};
  return {
    name: p.product_name,
    kcal: parseFloat(n['energy-kcal_100g']) || 0,
    protein: parseFloat(n['proteins_100g']) || 0,
    carbs: parseFloat(n['carbohydrates_100g']) || 0,
    fat: parseFloat(n['fat_100g']) || 0,
    fibre: parseFloat(n['fiber_100g'] || n['fibers_100g']) || 0,
    sugar: parseFloat(n['sugars_100g']) || 0,
    sodium: parseFloat(n['sodium_100g']) || 0,
  };
}

async function fetchOFF(query, subdomain = 'en') {
  const url = `https://${subdomain}.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&json=1&action=process&fields=code,product_name,nutriments&page_size=20&sort_by=unique_scans_n&lc=en`;
  const res = await fetch(url);
  const data = await res.json();
  return (data.products || [])
    .filter(p => p.product_name && isEnglishName(p.product_name))
    .map(offProductToFood);
}

async function searchUSDA(query) {
  // USDA FoodData Central — excellent partial/full-text matching for generic ingredients
  const url = `https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(query)}&api_key=DEMO_KEY&pageSize=20&dataType=Foundation,SR%20Legacy,Branded&sortBy=score&sortOrder=desc`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    return (data.foods || []).filter(f => f.description && isEnglishName(f.description)).map(f => {
      const get = id => (f.foodNutrients || []).find(n => n.nutrientId === id)?.value || 0;
      return {
        name: f.description,
        kcal: r1(get(1008)),
        protein: r1(get(1003)),
        carbs: r1(get(1005)),
        fat: r1(get(1004)),
        fibre: r1(get(1079)),
        sugar: r1(get(2000)),
        sodium: r1(get(1093) / 1000), // mg → g
        _usda: true
      };
    });
  } catch(e) { return []; }
}

async function searchOFF(query) {
  try {
    // Run UK OFF, EN OFF, and USDA in parallel for speed
    const [ukResults, enResults, usdaResults] = await Promise.all([
      fetchOFF(query, 'uk'),
      fetchOFF(query, 'en'),
      searchUSDA(query)
    ]);

    // Merge OFF results: UK first, then EN deduped
    const seen = new Set(ukResults.map(r => r.name.toLowerCase()));
    const allOFF = [...ukResults];
    enResults.forEach(r => { if (!seen.has(r.name.toLowerCase())) { seen.add(r.name.toLowerCase()); allOFF.push(r); } });

    // If still few results, try singular/plural variant against both subdomains
    if (allOFF.length < 4) {
      const alt = query.endsWith('s') ? query.slice(0, -1) : query + 's';
      const [ukAlt, enAlt] = await Promise.all([fetchOFF(alt, 'uk'), fetchOFF(alt, 'en')]);
      [...ukAlt, ...enAlt].forEach(r => { if (!seen.has(r.name.toLowerCase())) { seen.add(r.name.toLowerCase()); allOFF.push(r); } });
    }

    // Merge: OFF first (branded/barcoded), USDA fills gaps
    const merged = [...allOFF];
    usdaResults.forEach(r => { if (!seen.has(r.name.toLowerCase())) { seen.add(r.name.toLowerCase()); merged.push(r); } });
    return merged;
  } catch(e) { return []; }
}

  pendingFood = food;

  let macroText = `Per 100g: ${r1(food.kcal)} kcal · P ${r1(food.protein)}g · C ${r1(food.carbs)}g · F ${r1(food.fat)}g`;
  const extras = [];
  if (food.fibre) extras.push(`Fibre ${r1(food.fibre)}g`);
  if (food.sugar) extras.push(`Sugar ${r1(food.sugar)}g`);
  if (food.sodium) extras.push(`Na ${r1(food.sodium*1000)}mg`);

function confirmLogFood() {
  const w = parseFloat(document.getElementById('weight-input').value);
  if (!w || w <= 0) { toast('Enter a valid weight'); return; }
  const f = pendingFood;
  const keepScanning = f._keepScanning;
  const factor = w / 100;
  addEntryToLog({
    id: uid(), name: f.name, weight: w, meal: selectedMeal,
    kcal: r1(f.kcal * factor),
    protein: r1(f.protein * factor),
    carbs: r1(f.carbs * factor),
    fat: r1(f.fat * factor),
    fibre: r1((f.fibre||0) * factor),
    sugar: r1((f.sugar||0) * factor),
    sodium: r1((f.sodium||0) * factor),
    barcode: f.barcode || null
  });
  // Auto-save to custom foods (upsert)
  const customs = getCustomFoods();
  const ci = f.barcode ? customs.findIndex(c => c.barcode === f.barcode) : customs.findIndex(c => c.name.toLowerCase() === f.name.toLowerCase());
  if (ci >= 0) customs[ci] = { ...customs[ci], ...{ name: f.name, kcal: f.kcal, protein: f.protein, carbs: f.carbs, fat: f.fat, defaultWeight: f.defaultWeight || 100, barcode: f.barcode || customs[ci].barcode } };
  else customs.push({ id: uid(), name: f.name, kcal: f.kcal, protein: f.protein, carbs: f.carbs, fat: f.fat, defaultWeight: f.defaultWeight || 100, barcode: f.barcode || null });
  LS.set('mt_custom_foods', customs);

  closeModal('weight-modal');
  viewingDate = todayKey();
  toast(`Added ${f.name}`);
  if (keepScanning) startScan();
}

let ingCodeReader = null;

async function startIngredientScan() {
  if (typeof ZXing === 'undefined') { toast('ZXing not loaded'); return; }
  try {
    ingCodeReader = new ZXing.BrowserMultiFormatReader();
    const constraints = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } };
    await ingCodeReader.decodeFromConstraints(constraints, 'ing-scan-video', async (result, err) => {
      if (result) {
        const text = result.getText();
        if (!ingCodeReader) return;
        try { ingCodeReader.reset(); } catch(e) {} ingCodeReader = null;
        const statusEl = document.getElementById('ing-scan-status');
        if (statusEl) statusEl.textContent = 'Looking up barcode…';
        const food = await lookupBarcode(text);
        if (food) showIngredientWeight(food);
        else { toast('Barcode not found — try search'); if (statusEl) statusEl.textContent = 'Not found'; }
      }
      if (err && !(err instanceof ZXing.NotFoundException)) console.warn(err);
    });
    const statusEl = document.getElementById('ing-scan-status');
    if (statusEl) statusEl.textContent = 'Point camera at a barcode';
  } catch(e) {
    toast('Camera error: ' + e.message);
  }
}

function stopIngredientScan() {
  if (ingCodeReader) { try { ingCodeReader.reset(); } catch(e) {} ingCodeReader = null; }
  const video = document.getElementById('ing-scan-video');
  if (video && video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
}

function saveRecipe() {
  const name = document.getElementById('recipe-name-input').value.trim();
  if (!name) { toast('Enter a recipe name'); return; }
  if (!editingRecipeIngredients.length) { toast('Add at least one ingredient'); return; }
  const totalWeight = parseFloat(document.getElementById('recipe-total-weight').value);
  if (!totalWeight || totalWeight <= 0) { toast('Enter total cooked weight'); return; }

  const totalNutrition = editingRecipeIngredients.reduce((acc, ing) => {
    const f = ing.weight / 100;
    return { kcal: acc.kcal + ing.kcal * f, protein: acc.protein + ing.protein * f,
             carbs: acc.carbs + ing.carbs * f, fat: acc.fat + ing.fat * f };
  }, { kcal:0, protein:0, carbs:0, fat:0 });

  const recipes = getRecipes();
  const recipe = {
    id: editingRecipe ? editingRecipe.id : uid(),
    name, totalWeight, totalNutrition,
    ingredients: editingRecipeIngredients.slice()
  };

  if (editingRecipe) {
    const idx = recipes.findIndex(r => r.id === editingRecipe.id);
    if (idx >= 0) recipes[idx] = recipe; else recipes.push(recipe);
  } else {
    recipes.push(recipe);
  }
  LS.set('mt_recipes', recipes);
  closeModal('recipe-edit-modal');
  renderRecipes();
  toast('Recipe saved!');

  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
// Close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) closeModal(backdrop.id);
  });
});

// ═══════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════
function r1(v) { return Math.round((v||0) * 10) / 10; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════
//  WEIGHT LOG
// ═══════════════════════════════════════════════════
function getWeightLog() { return LS.get('mt_weight_log', []); }

function logWeightToday(val) {
  const w = parseFloat(val);
  if (!w || w < 20 || w > 300) return;
  const log = getWeightLog();
  const idx = log.findIndex(e => e.date === viewingDate);
  if (idx >= 0) log[idx].weight = w;
  else { log.push({ date: viewingDate, weight: w }); log.sort((a,b) => a.date.localeCompare(b.date)); }
  LS.set('mt_weight_log', log);
  renderToday();
}

function weightSparkline(entries) {
  if (entries.length < 2) return '';
  const ws = entries.map(e => e.weight);
  const min = Math.min(...ws), max = Math.max(...ws), range = max - min || 1;
  const W = 280, H = 50;
  const pts = entries.map((e,i) => {
    const x = (i / (entries.length - 1)) * W;
    const y = H - ((e.weight - min) / range) * (H - 8) - 4;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="50" style="overflow:visible;">
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${entries.map((_,i)=>(i/(entries.length-1)*W)).slice(-1)[0]}" cy="${(H - ((ws[ws.length-1]-min)/range)*(H-8) - 4).toFixed(1)}" r="3" fill="var(--accent)"/>
  </svg>`;
}

// ═══════════════════════════════════════════════════
//  DIARY NOTES
// ═══════════════════════════════════════════════════
function saveDiaryNotes(val) {
  const day = getDayLog(viewingDate);
  day.notes = val;
  saveDayLog(viewingDate, day);
}

// ═══════════════════════════════════════════════════
//  STREAK
// ═══════════════════════════════════════════════════
function getStreak() {
  const logs = getLogs();
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = d.toISOString().slice(0, 10);
    const log = logs.find(l => l.date === key);
    if (!log || !log.entries.length) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

// ═══════════════════════════════════════════════════
//  WEEKLY SUMMARY
// ═══════════════════════════════════════════════════
function getWeeklySummary() {
  const base = new Date(viewingDate + 'T00:00:00');
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(base); d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    const log = getLogs().find(l => l.date === key);
    if (log && log.entries.length) days.push(sumEntries(log.entries));
  }
  if (!days.length) return null;
  const avg = f => r1(days.reduce((s,d) => s + d[f], 0) / days.length);
  return { days: days.length, kcal: avg('kcal'), protein: avg('protein'), carbs: avg('carbs'), fat: avg('fat') };
}

// ═══════════════════════════════════════════════════
//  FREQUENTLY EATEN
// ═══════════════════════════════════════════════════
function getFrequentFoods(n = 6) {
  const counts = {};
  getLogs().forEach(day => day.entries.forEach(e => {
    const k = e.name.toLowerCase();
    if (!counts[k]) counts[k] = { entry: e, n: 0 };
    counts[k].n++;
  }));
  return Object.values(counts).sort((a,b) => b.n - a.n).slice(0, n).map(c => c.entry);
}

function renderFrequentFoods() {
  const el = document.getElementById('frequent-foods');
  if (!el) return;
  const foods = getFrequentFoods();
  if (!foods.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Frequent</div>` +
    foods.map((f,i) => `<div class="result-item" onclick="pickFrequentFood(${i})">
      <div class="result-name">${esc(f.name)}</div>
      <div class="result-macros">${f.kcal} kcal · P ${f.protein}g per 100g</div>
    </div>`).join('');
  window._freqFoods = foods;
}

function pickFrequentFood(i) {
  const f = window._freqFoods[i];
  showWeightModal({ ...f, defaultWeight: f.weight || f.defaultWeight || 100 });
}

// ═══════════════════════════════════════════════════
//  QUICK ADD
// ═══════════════════════════════════════════════════
function confirmQuickAdd() {
  const kcal = parseFloat(document.getElementById('qa-kcal').value) || 0;
  const protein = parseFloat(document.getElementById('qa-protein').value) || 0;
  const carbs = parseFloat(document.getElementById('qa-carbs').value) || 0;
  const fat = parseFloat(document.getElementById('qa-fat').value) || 0;
  if (!kcal && !protein && !carbs && !fat) { toast('Enter at least one value'); return; }
  const name = document.getElementById('qa-name').value.trim() || 'Quick Add';
  addEntryToLog({ id: uid(), name, meal: selectedQAMeal, kcal, protein, carbs, fat, weight: null, barcode: null });
  ['qa-name','qa-kcal','qa-protein','qa-carbs','qa-fat'].forEach(id => document.getElementById(id).value = '');
  viewingDate = todayKey();
  toast(`Added ${name}`);
}

// Also hide frequent foods when user starts typing
function debounceSearch() {
  const q = document.getElementById('search-input').value;
  if (q) document.getElementById('frequent-foods').innerHTML = '';
  else renderFrequentFoods();
  clearTimeout(window._searchTimer);
  window._searchTimer = setTimeout(doSearch, 400);
}

// ═══════════════════════════════════════════════════
//  PWA / SERVICE WORKER
// ═══════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(e => console.warn('SW reg failed', e));

  // Auto-reload when a new SW takes control
  navigator.serviceWorker.addEventListener('controllerchange', () => { window.location.href = window.location.href; });
}

async function checkForUpdate() {
  toast('Checking for update…');
  try {
    const reg = await navigator.serviceWorker.getRegistration();
    if (!reg) { toast('No service worker'); return; }
    // reg.update() fetches sw.js bypassing HTTP cache.
    // If a new SW is found it installs, skipWaiting() fires, then controllerchange
    // fires on this page → the controllerchange listener (below) reloads the page.
    await reg.update();
    // Give the SW a moment to install/activate; if controllerchange hasn't
    // fired within 3s there was no update.
    setTimeout(() => toast('Already up to date'), 3000);
  } catch(e) { toast('Update check failed'); }
}

function fixAppHeight() {
  document.getElementById('app').style.height = window.innerHeight + 'px';
}
fixAppHeight();
window.addEventListener('resize', fixAppHeight);

renderToday();

document.querySelector('[onclick*="view-log"] , [onclick*=\'log\']');
